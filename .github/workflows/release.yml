# Builds the Windows and Linux installers and publishes a GitHub Release
# whenever a `v*` tag is pushed. Publish flow:
#   git tag v0.1.0 && git push origin v0.1.0
# → wait for this workflow → review the draft on the Releases page → publish.
#
# The TAURI_SIGNING_* secrets are for tauri-plugin-updater artifact
# signatures (latest.json + .sig). Until the updater is wired up and the
# secrets are set, they resolve to empty strings and the build simply
# skips updater artifacts.
#
# build-linux runs after build-windows (not in parallel): tauri-action
# finds-or-creates a release by tag name, and two jobs racing to create it
# for the same tag can end up creating two separate releases instead of
# sharing one. Making build-linux `needs: build-windows` means it always
# runs against a release that already exists, so it just appends its
# artifacts (.AppImage/.deb/.rpm + updater .sig files) to it.
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Baked into the build by src-tauri/build.rs. Add these as repo
          # Actions secrets. If unset, the released build just ships with
          # scrobbling disabled and nothing else breaks.
          YTUBIC_LASTFM_API_KEY: ${{ secrets.YTUBIC_LASTFM_API_KEY }}
          YTUBIC_LASTFM_API_SECRET: ${{ secrets.YTUBIC_LASTFM_API_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Goosic ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false

  build-linux:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            gstreamer1.0-tools \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-libav
      - name: Verify build-host media plugins
        run: |
          gst-inspect-1.0 appsink
          gst-inspect-1.0 autoaudiosink
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          YTUBIC_LASTFM_API_KEY: ${{ secrets.YTUBIC_LASTFM_API_KEY }}
          YTUBIC_LASTFM_API_SECRET: ${{ secrets.YTUBIC_LASTFM_API_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Goosic ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
      - name: Verify bundled AppImage media plugins
        shell: bash
        run: |
          appimage="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "$appimage"
          chmod +x "$appimage"
          mkdir -p "$RUNNER_TEMP/goosic-appimage-check"
          cd "$RUNNER_TEMP/goosic-appimage-check"
          "$GITHUB_WORKSPACE/$appimage" --appimage-extract >/dev/null
          test -f squashfs-root/usr/lib/gstreamer-1.0/libgstapp.so
          test -f squashfs-root/usr/lib/gstreamer-1.0/libgstautodetect.so
          test -f squashfs-root/usr/lib/gstreamer-1.0/libgstlibav.so
